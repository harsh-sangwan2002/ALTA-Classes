<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machine Coding - 1</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .stars-container {
            display: flex;
            justify-content: center;
            align-content: center;
            gap: 1rem;
        }

        .star {
            font-size: 3rem;
            cursor: pointer;
        }

        .selected {
            color: gold;
        }
    </style>
</head>

<body>
    <h1>Rate this Product</h1>
    <div class="stars-container">
        <span class="star" data-index="1">&#9733;</span>
        <span class="star" data-index="2">&#9733;</span>
        <span class="star" data-index="3">&#9733;</span>
        <span class="star" data-index="4">&#9733;</span>
        <span class="star" data-index="5">&#9733;</span>
    </div>
    <h2>Rating: <span class="rating">0</span></h2>
</body>

<script>

    const starsContainerRef = document.querySelector('.stars-container');
    const rating = document.querySelector('.rating');

    starsContainerRef.addEventListener('click', e => {
        const elementRef = e.target;

        if (elementRef.classList.contains('star')) {
            const idx = elementRef.getAttribute('data-index');

            for (let i = 0; i < 5; i++)
                starsContainerRef.children[i].classList.remove('selected');

            for (let i = 0; i < idx; i++) {
                starsContainerRef.children[i].classList.add('selected');
            }

            rating.innerText = idx;
        }
    })

    starsContainerRef.addEventListener('mouseover', e => {
        const elementRef = e.target;

        if (elementRef.classList.contains('star')) {
            const idx = elementRef.getAttribute('data-index');

            for (let i = 0; i < 5; i++)
                starsContainerRef.children[i].classList.remove('selected');

            for (let i = 0; i < idx; i++) {
                starsContainerRef.children[i].classList.add('selected');
            }
        }
    })

    starsContainerRef.addEventListener('mouseout', e => {
        const elementRef = e.target;
        const currRating = rating.innerText;

        if (elementRef.classList.contains('star')) {
            const idx = elementRef.getAttribute('data-index');

            for (let i = 0; i < idx; i++) {
                starsContainerRef.children[i].classList.remove('selected');
            }

            for (let i = 0; i < currRating; i++) {
                starsContainerRef.children[i].classList.add('selected');
            }
        }
    })

</script>
